<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

<body>
    <div class="container-md">
        <h1>Bevásárlólista</h1>
        <div class="row">
            <div class="col-md-6">
                <input class="form-control" />
                <h4>Hozzávaló hozzáadása</h4>
                <label class="form-label">Hozzávaló neve</label>
                <input type="text" class="form-control" />
                <label class="form-label mt-2">Mennyiség</label>
                <input type="number" class="form-control" />
                <label class="form-label mt-2">Mennyiség egység</label>
                <select class="form-select">
                    <option value="1">kg</option>
                    <option value="2">g</option>
                    <option value="3">l</option>
                    <option value="4">ml</option>
                    <option value="5">db</option>
                </select>
                <label class="form-label mt-2">Kategória</label>
                <select class="form-select">
                    <option value="1">Húsfélék</option>
                    <option value="2">Gyümölcs/zöldség</option>
                    <option value="3">Tésztafélék/péktermékek</option>
                    <option value="4">Késztermékek</option>
                </select>
                <button class="btn btn-primary mt-2">Hozzáadás</button>


            </div>
            <div class="col-md-6">
                <input class="form-control" />
            </div>
        </div>
    </div>

    </script>
</body>
